:root{--bg:#07070a;--panel:#101018;--text:#fff;--muted:#a7a7b4;--line:rgba(255,255,255,.1);--red:#e50914;--gold:#ffd166}

.container{max-width:1280px;margin:auto;padding:22px 18px 48px}
.hero{position:relative;min-height:390px;border-radius:26px;overflow:hidden;background:#111;border:1px solid var(--line);margin-bottom:26px}

.hero h1{font-size:clamp(34px,5vw,62px);line-height:1;margin:16px 0 12px;letter-spacing:-2px}
.hero p{color:#d5d5dc;line-height:1.6;font-size:16px}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}

.change{border:1px solid var(--line);background:#15151e;color:white;border-radius:12px;padding:10px 12px;cursor:pointer;font-weight:800}
.rail{display:grid;grid-auto-flow:column;grid-auto-columns:210px;gap:14px;overflow-x:auto;padding-bottom:10px}
.layout{display:grid;grid-template-columns:1fr 320px;gap:22px;align-items:start}
.sidebar{position:sticky;top:92px;display:grid;gap:16px}

.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden;transition:.18s}
